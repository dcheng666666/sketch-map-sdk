name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: write # changesets/action needs to push the "Version Packages" PR branch and tags
  pull-requests: write # ...and to open/update that PR
  id-token: write # required by npm publish --provenance (GitHub OIDC)

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip on commits authored by the changesets bot itself or on forks.
    if: |
      github.repository == 'dcheng666666/sketch-map-sdk' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # Trusted Publishing (OIDC) requires Node >= 22.14.0
          node-version: 22.14.0
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm CLI supports OIDC
        run: |
          npm i -g npm@11.5.1
          npm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # changesets/action runs in two modes depending on the state of main:
      #
      # 1. If there are unconsumed changeset files under .changeset/, it
      #    opens (or updates) a single "Version Packages" PR that bumps
      #    package.json and prepends CHANGELOG.md entries. That PR's CI
      #    is the normal ci.yml; merging it triggers mode 2.
      #
      # 2. If there are no unconsumed changeset files but package.json
      #    version is ahead of the latest npm release, it runs the
      #    `publish` command (`changeset publish`), which calls
      #    `npm publish`. The package's prepublishOnly hook runs the
      #    build, so dist/ is always fresh.
      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_CONFIG_PROVENANCE makes `npm publish` attach a provenance
          # statement signed by GitHub's OIDC issuer, so npmjs.com shows
          # a verified build-source badge on the published version.
          NPM_CONFIG_PROVENANCE: "true"
